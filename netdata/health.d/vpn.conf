# netdata/health.d/vpn.conf — Netdata health alerts for hogen-vpn.
# Install (done by setup-nginx.sh):
#   install -m 644 netdata/health.d/vpn.conf /etc/netdata/health.d/vpn.conf
#   systemctl reload netdata

# ── Port connectivity ─────────────────────────────────────────────────────────
# WARN immediately when a port becomes unreachable; escalate to CRIT after 5 min.

 alarm: vpn_port_vless
    on: vpn.ports
lookup: min -2m unaligned of p8443
 units: status
 every: 30s
  warn: $this == 0
  crit: $this == 0
 delay: up 5min multiplier 1 max 30min
  info: Xray/VLESS port 8443 is unreachable
    to: sysadmin

 alarm: vpn_port_mtproxy
    on: vpn.ports
lookup: min -2m unaligned of p2083
 units: status
 every: 30s
  warn: $this == 0
  crit: $this == 0
 delay: up 5min multiplier 1 max 30min
  info: MTProxy port 2083 is unreachable
    to: sysadmin

 alarm: vpn_port_shadowsocks
    on: vpn.ports
lookup: min -2m unaligned of p8388
 units: status
 every: 30s
  warn: $this == 0
  crit: $this == 0
 delay: up 5min multiplier 1 max 30min
  info: Shadowsocks port 8388 is unreachable
    to: sysadmin

 alarm: vpn_wireguard_container
    on: vpn.ports
lookup: min -2m unaligned of pwg
 units: status
 every: 30s
  warn: $this == 0
  crit: $this == 0
 delay: up 5min multiplier 1 max 30min
  info: WireGuard container is not running
    to: sysadmin

# ── Rotation staleness ────────────────────────────────────────────────────────
# Warn when a cover domain hasn't been rotated for 60 min; crit at 2 hours.
# Adjust thresholds to match XRAY_ROTATE_MINS / MTG_ROTATE_MINS.

 alarm: vpn_xray_rotation_stale
    on: vpn.rotation_age
lookup: max -5m unaligned of xray
 units: minutes
 every: 5m
  warn: $this > 60
  crit: $this > 120
  info: Xray cover domain last rotated ${alarm_value} minutes ago
    to: sysadmin

 alarm: vpn_mtg_rotation_stale
    on: vpn.rotation_age
lookup: max -5m unaligned of mtg
 units: minutes
 every: 5m
  warn: $this > 60
  crit: $this > 120
  info: MTProxy cover domain last rotated ${alarm_value} minutes ago
    to: sysadmin
