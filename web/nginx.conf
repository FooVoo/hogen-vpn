# Docker-based nginx config template — alternative to the host vhost (web/nginx-vhost.conf.template).
# Used by web/entrypoint.sh when running nginx inside a Docker container.
# PAGE_TOKEN is substituted by entrypoint.sh via envsubst before installation.

# Rate limiting — mirrors the host nginx setup (web/nginx-ratelimit.conf)
limit_req_zone $binary_remote_addr zone=vpn_auth:10m rate=5r/m;
limit_req_status 429;

server {
    listen 80;
    server_tokens off;

    # Credentials page — only the exact token path is served
    location /${PAGE_TOKEN}/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/index.html =404;

        limit_req zone=vpn_auth burst=5 nodelay;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;
    }

    # Drop everything else — no HTTP response, connection closed immediately
    location / {
        return 444;
    }
}
