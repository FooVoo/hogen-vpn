# Docker-based nginx config — alternative to the host vhost (web/nginx-vhost.conf).
# Used by web/entrypoint.sh when running nginx inside a Docker container.
server {
    listen 80;

    location / {
        auth_basic "VPN";
        auth_basic_user_file /etc/nginx/htpasswd;
        root /usr/share/nginx/html;
        index index.html;
    }
}
