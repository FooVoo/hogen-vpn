# Docker-based nginx config — alternative to the host vhost (web/nginx-vhost.conf.template).
# Used by web/entrypoint.sh when running nginx inside a Docker container.
# The credentials page is served at /$PAGE_TOKEN/ (same token-URL model as the host setup).
server {
    listen 80;
    server_tokens off;

    location / {
        root /usr/share/nginx/html;
        index index.html;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
    }
}
