services:
  mtg:
    image: nineseconds/mtg:2
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "2083:3128"
    volumes:
      - ./mtg/config.toml:/config/config.toml:ro
    healthcheck:
      # 'mtg healthcheck' does not exist in nineseconds/mtg v2.
      # 'mtg access' reads + validates config (no network I/O when both
      # --ipv4 and --ipv6 are supplied) and exits 0 on success.
      test: ["CMD", "/mtg", "access", "/config/config.toml", "--ipv4", "127.0.0.1", "--ipv6", "::1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ipsec:
    # strongSwan uses setuid helper binaries; no-new-privileges would break IKEv2
    image: hwdsl2/ipsec-vpn-server:latest
    restart: unless-stopped
    environment:
      VPN_IPSEC_PSK: "${IKE_PSK}"
      VPN_USER: "${IKE_USER}"
      VPN_PASSWORD: "${IKE_PASSWORD}"
      VPN_IKEV2_ONLY: "yes"
      VPN_DNS_SRV1: "1.1.1.1"
      VPN_DNS_SRV2: "8.8.8.8"
      # Optional: FQDN that resolves to this server, used as the IKEv2 server
      # identity in the certificate. Improves reconnection on Apple clients.
      # Set VPN_DNS_NAME in .env; leave empty to fall back to the server IP.
      VPN_DNS_NAME: "${VPN_DNS_NAME:-}"
    ports:
      - "500:500/udp"
      - "4500:4500/udp"
    cap_add:
      - NET_ADMIN
    devices:
      - "/dev/ppp:/dev/ppp"
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.accept_redirects=0
      - net.ipv4.conf.all.send_redirects=0
      - net.ipv4.conf.all.rp_filter=0
      - net.ipv4.conf.default.accept_redirects=0
      - net.ipv4.conf.default.send_redirects=0
      - net.ipv4.conf.default.rp_filter=0
      - net.ipv4.conf.default.accept_source_route=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv4.ip_no_pmtu_disc=1
    volumes:
      - ./ipsec/data:/etc/ipsec.d
      - /lib/modules:/lib/modules:ro
    healthcheck:
      # 'ipsec status' returns 0 even when pluto's socket is stuck and cannot
      # accept new IKE handshakes. Checking that port 4500 (NAT-T) is bound AND
      # the ikev2-cp connection is loaded detects the stuck state so Docker can
      # auto-restart the container (restart: unless-stopped triggers on unhealthy).
      test: ["CMD-SHELL", "ipsec status 2>/dev/null | grep -q ikev2-cp && ss -ulnp | grep -q ':4500 '"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  xray:
    image: ghcr.io/xtls/xray-core:26.3.27
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "8443:8443"
      - "8388:8388/tcp"
      - "8388:8388/udp"
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
    command: run -c /etc/xray/config.json
    healthcheck:
      test: ["CMD-SHELL", "ss -tlnp | grep -q ':8443 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Etc/UTC"
    ports:
      - "${WG_PORT:-51820}:${WG_PORT:-51820}/udp"
    volumes:
      - ./wireguard/wg0.conf:/config/wg_confs/wg0.conf:ro
      - /lib/modules:/lib/modules:ro
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    healthcheck:
      # Verify wg0 is up AND bound to the expected listen port.
      # "listening port: <port>" only appears when wg-quick completed successfully;
      # a plain "ip link show wg0" would pass even on a half-initialised interface.
      test: ["CMD-SHELL", "wg show wg0 2>/dev/null | grep -q 'listening port: ${WG_PORT:-51820}'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
