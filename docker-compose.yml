services:
  mtg:
    image: nineseconds/mtg:2
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "2083:3128"
    volumes:
      - ./mtg/config.toml:/config/config.toml:ro
    healthcheck:
      # 'mtg healthcheck' does not exist in nineseconds/mtg v2.
      # 'mtg access' reads + validates config (no network I/O when both
      # --ipv4 and --ipv6 are supplied) and exits 0 on success.
      test: ["CMD", "/mtg", "access", "/config/config.toml", "--ipv4", "127.0.0.1", "--ipv6", "::1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ipsec:
    # strongSwan uses setuid helper binaries; no-new-privileges would break IKEv2
    image: hwdsl2/ipsec-vpn-server:latest
    restart: unless-stopped
    environment:
      VPN_IPSEC_PSK: "${IKE_PSK}"
      VPN_USER: "${IKE_USER}"
      VPN_PASSWORD: "${IKE_PASSWORD}"
      VPN_IKEV2_ONLY: "yes"
      VPN_DNS_SRV1: "1.1.1.1"
      VPN_DNS_SRV2: "8.8.8.8"
    ports:
      - "500:500/udp"
      - "4500:4500/udp"
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.accept_redirects=0
      - net.ipv4.conf.all.send_redirects=0
      - net.ipv4.conf.default.rp_filter=0
      - net.ipv4.conf.default.accept_source_route=0
      - net.ipv4.conf.default.send_redirects=0
    volumes:
      - ./ipsec/data:/etc/ipsec.d
      - /lib/modules:/lib/modules:ro
    healthcheck:
      test: ["CMD-SHELL", "ipsec status >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  xray:
    image: ghcr.io/xtls/xray-core:26.3.27
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "8443:8443"
      - "8388:8388/tcp"
      - "8388:8388/udp"
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
    command: run -c /etc/xray/config.json
    healthcheck:
      test: ["CMD-SHELL", "ss -tlnp | grep -q ':8443 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
