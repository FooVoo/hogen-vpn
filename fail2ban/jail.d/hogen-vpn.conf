# fail2ban jail configuration for hogen-vpn.
# Installed to /etc/fail2ban/jail.d/hogen-vpn.conf by setup-nginx.sh.
# Requires: fail2ban >= 0.11, ufw, nginx.

[DEFAULT]
# Use UFW as the ban backend (consistent with our UFW-managed firewall)
banaction = ufw
banaction_allports = ufw

# ── SSH protection ─────────────────────────────────────────────────────────────
[sshd]
enabled  = true
port     = ssh
filter   = sshd
backend  = systemd
maxretry = 5
findtime = 10m
bantime  = 1h

# ── nginx rate-limit exceeded (HTTP 429) ───────────────────────────────────────
# Triggers when nginx's limit_req_zone fires (vpn_auth: 5r/m, vpn_check: 60r/m).
# Built-in filter: /etc/fail2ban/filter.d/nginx-limit-req.conf
[nginx-limit-req]
enabled  = true
port     = http,https
filter   = nginx-limit-req
logpath  = /var/log/nginx/error.log
maxretry = 10
findtime = 5m
bantime  = 1h

# ── nginx path-probing (HTTP 444 — connection dropped) ─────────────────────────
# Triggers when a client requests any path that is not /$PAGE_TOKEN/ or /check.
# nginx returns 444 (closes connection) and logs it in access.log.
# Custom filter: fail2ban/filter.d/nginx-path-probe.conf → installed by setup-nginx.sh.
[nginx-path-probe]
enabled  = true
port     = http,https
filter   = nginx-path-probe
logpath  = /var/log/nginx/access.log
maxretry = 5
findtime = 5m
bantime  = 24h
