# fail2ban jail configuration for hogen-vpn.
# Installed to /etc/fail2ban/jail.d/hogen-vpn.conf by setup-nginx.sh.
# Requires: fail2ban >= 0.11, ufw, nginx.

[DEFAULT]
# Use UFW as the ban backend (consistent with our UFW-managed firewall)
banaction = ufw
banaction_allports = ufw

# ── SSH protection ─────────────────────────────────────────────────────────────
[sshd]
enabled  = true
port     = ssh
filter   = sshd
backend  = systemd
maxretry = 5
findtime = 10m
bantime  = 1h

# ── Nginx HTTP Basic Auth (VPN credentials page) ───────────────────────────────
[nginx-http-auth]
enabled  = true
port     = http,https
filter   = nginx-http-auth
logpath  = /var/log/nginx/error.log
maxretry = 5
findtime = 5m
bantime  = 30m
