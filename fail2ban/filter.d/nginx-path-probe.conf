# fail2ban filter — detects path-probing via nginx 444 (connection closed, no response).
# Triggered when a client requests any path other than the valid token URL or /check.
# nginx logs 444 in access.log; no HTTP response is sent to the client.
#
# Install to /etc/fail2ban/filter.d/nginx-path-probe.conf (done by setup-nginx.sh).

[Definition]
failregex = ^<HOST> .+? "\S+ \S+ HTTP/\S+" 444
ignoreregex =
